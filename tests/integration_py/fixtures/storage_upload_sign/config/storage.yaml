policies:
  "avatars/*":
    upload_sign:
      roles: [authenticated]
      condition: "true"
      maxSize: 5MB
      allowedTypes: ["image/jpeg", "image/png"]
  "denied/*":
    upload_sign:
      roles: [authenticated]
      condition: "false"
      maxSize: 5MB
      allowedTypes: ["image/jpeg"]
