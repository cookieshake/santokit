policies:
  "docs/{userId}/*":
    upload_sign:
      roles: [authenticated]
      condition: "path.userId == request.auth.sub"
      maxSize: 5MB
      allowedTypes: ["application/pdf"]
  "org/{orgId}/user/{userId}/*":
    upload_sign:
      roles: [authenticated, admin]
      condition: "path.orgId == \"nope\" || path.userId == request.auth.sub || 'admin' in request.auth.roles"
      maxSize: 5MB
      allowedTypes: ["application/pdf"]
  "typo/{userId}/*":
    upload_sign:
      roles: [authenticated]
      condition: "path.missing == request.auth.sub"
      maxSize: 5MB
      allowedTypes: ["application/pdf"]
