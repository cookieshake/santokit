version: 1
tables:
  samples:
    connection: main
    id:
      name: id
      type: bigint
      generate: auto_increment
    columns:
      title:
        type: string
        nullable: false
      count:
        type: int
        nullable: false
      ratio:
        type: float
        nullable: false
      amount:
        type: decimal
        nullable: false
      enabled:
        type: boolean
        nullable: false
      payload:
        type: json
        nullable: false
      happened_at:
        type: timestamp
        nullable: false
      blob:
        type: bytes
        nullable: false
      avatar:
        type: file
        bucket: main
        nullable: false
      tags:
        type: array
        items: string
        nullable: false
      matrix:
        type: array<int>
        nullable: false
      optional_amount:
        type: decimal
        nullable: true
